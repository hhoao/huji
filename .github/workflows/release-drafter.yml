name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  update_release:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.release_drafter.outputs.upload_url }}
      tag_name: ${{ steps.release_drafter.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
      - id: release_drafter
        uses: release-drafter/release-drafter@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          publish: true

  check_changes:
    runs-on: ubuntu-latest
    outputs:
      restcut_app: ${{ steps.filter.outputs.restcut_app }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            restcut_app:
              - 'restcut_app/**'

  build_android:
    needs: [update_release, check_changes]
    if: needs.check_changes.outputs.restcut_app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Get version from pubspec
        id: version
        run: echo "version=$(grep '^version:' restcut_app/pubspec.yaml | sed 's/version:[[:space:]]*//' | tr -d ' ')" >> $GITHUB_OUTPUT
      - name: Install NDK
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "ndk;28.0.13004108" "cmake;3.22.1"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Get dependencies
        run: flutter pub get
        working-directory: restcut_app
      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi
        working-directory: restcut_app
      - name: Build App Bundle
        run: flutter build appbundle --release
        working-directory: restcut_app
      - name: Upload APK (arm64-v8a)
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ needs.update_release.outputs.upload_url }}
          asset_path: restcut_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          asset_name: restcut-app-${{ steps.version.outputs.version }}-arm64-v8a-release.apk
      - name: Upload APK (armeabi-v7a)
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ needs.update_release.outputs.upload_url }}
          asset_path: restcut_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          asset_name: restcut-app-${{ steps.version.outputs.version }}-armeabi-v7a-release.apk
      - name: Upload APK (x86_64)
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ needs.update_release.outputs.upload_url }}
          asset_path: restcut_app/build/app/outputs/flutter-apk/app-x86_64-release.apk
          asset_name: restcut-app-${{ steps.version.outputs.version }}-x86_64-release.apk
      - name: Upload AAB
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ needs.update_release.outputs.upload_url }}
          asset_path: restcut_app/build/app/outputs/bundle/release/app-release.aab
          asset_name: restcut-app-${{ steps.version.outputs.version }}.aab
