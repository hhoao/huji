name: restcut
description: "弧迹 - 智能视频剪辑应用"
publish_to: "none"

version: 2.2.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  path_provider: ^2.1.2

  # base
  bloc_concurrency: ^0.3.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.5
  http: ^1.2.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.3
  logger: ^2.6.0
  freezed_annotation: ^3.1.0
  path: ^1.9.0
  uuid: ^4.5.1
  file: ^7.0.1
  crypto: ^3.0.5

  file_picker: ^10.2.0
  cupertino_icons: ^1.0.8
  chewie: ^1.12.1
  video_player: ^2.10.0

  retrofit: ^4.6.0
  dio: ^5.8.0
  web_socket_channel: ^2.4.0
  sqflite_common_ffi: ^2.3.6
  sqlite3_flutter_libs: ^0.5.34
  
  carousel_slider: ^5.1.1
  dotted_border: ^3.1.0
  flutter_image_compress: ^2.4.0
  flutter_native_video_trimmer: ^1.1.9
  gal: ^2.3.1
  gal_linux: ^0.1.2
  sqflite: ^2.4.2
  workmanager: ^0.8.0
  open_file: ^3.5.10
  intl: ^0.20.2
  get: ^4.7.2
  flutter_cache_manager: ^3.4.1
  image_picker: ^1.0.7
  url_launcher: ^6.2.5
  flutter_local_notifications: ^19.3.0
  permission_handler: ^12.0.1
  ffmpeg_kit_flutter_new: ^2.0.0
  package_info_plus: ^8.0.2
  device_info_plus: ^10.1.0
  cached_network_image: ^3.4.1
  synchronized: ^3.4.0
  android_package_installer: ^0.0.3
  isolate_manager: ^6.0.1
  flutter_video_caching: ^0.3.9
  flutter_background_service: ^5.1.0
  photo_manager: ^3.7.1
  ultralytics_yolo: 0.1.29
  camera: ^0.11.2
  transparent_image: ^2.0.1
  multi_split_view: ^3.6.1
  watcher: ^1.1.0
  go_router: ^16.3.0
  camerawesome: ^2.5.0
  image: ^4.3.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  retrofit_generator: "10.0.0"
  build_runner: ^2.6.0
  json_serializable: ^6.9.5
  freezed: ^3.1.0
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.4
  rename: ^3.1.0
  husky: ^0.1.7
  change_app_package_name: ^1.5.0
  go_router_builder: ^3.3.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/svg/
    - assets/icons/
    - CHANGELOG.md

flutter_launcher_icons:
  android: "launcher_icon_dark"
  ios: true
  image_path: "assets/icons/logo_bg.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icons/logo_bg.png"
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: "assets/icons/logo_bg.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/logo_bg.png"
  linux:
    generate: true
    image_path: "assets/icons/logo_bg.png"
    icon_size: 128

flutter_native_splash:
  color: "#ffffff"
  image: assets/icons/logo_splash.png
  android_12:
    image: assets/icons/logo_splash.png
    icon_background_color: "#ffffff"
